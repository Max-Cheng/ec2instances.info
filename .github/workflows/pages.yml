name: Daily GitHub Pages

on:
    push:
        branches:
            - main
        paths-ignore:
            - README.md
            - docs/**
    schedule:
        # 02:23 Asia/Shanghai (UTC+8). Avoid the busy top of the hour.
        - cron: "23 18 * * *"
    workflow_dispatch:

concurrency:
    group: github-pages
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        name: Build daily Pages artifact
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        outputs:
            publish: ${{ steps.china_cloud_refresh.outputs.publish }}
        steps:
            - uses: actions/checkout@v6

            - name: Configure GitHub Pages
              id: pages
              uses: actions/configure-pages@v6

            - name: Identify tracked frontend content
              id: pages_shell_key
              run: echo "tree=$(git rev-parse HEAD:next)" >> "$GITHUB_OUTPUT"

            - name: Restore Pages shell for this frontend
              id: pages_shell
              uses: actions/cache/restore@v5
              with:
                  path: next/out
                  key: pages-shell-v2-${{ runner.os }}-${{ steps.pages_shell_key.outputs.tree }}
                  # Pushes still rebuild and validate; scheduled runs can reuse
                  # the shell across collector-only and documentation commits.
                  lookup-only: ${{ github.event_name == 'push' }}

            - name: Verify curated Pages shell input
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              run: |
                  jq -e \
                    '.generatedAt == null and .providers == {}' \
                    next/data/regionalClouds.generated.json >/dev/null
                  test ! -e next/public/data/china-clouds.json

            - name: Download current production instance data
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              run: |
                  curl --fail --location --retry 5 --retry-all-errors \
                    "https://instances.vantage.sh/www_pre_build.tar.gz?run=${GITHUB_RUN_ID}" \
                    --output /tmp/www_pre_build.tar.gz
                  sha256sum /tmp/www_pre_build.tar.gz
                  tar -tzf /tmp/www_pre_build.tar.gz > /tmp/www_entries.txt
                  if grep -Ev '^www(/|$)' /tmp/www_entries.txt | grep -q .; then
                    echo "Archive contains a path outside www/" >&2
                    exit 1
                  fi
                  if grep -Eq '(^|/)\.\.(/|$)|^/' /tmp/www_entries.txt; then
                    echo "Archive contains an unsafe path" >&2
                    exit 1
                  fi
                  tar -xzf /tmp/www_pre_build.tar.gz
                  test -s www/instances.json
                  test -s www/rds/instances.json
                  test -s www/cache/instances.json
                  test -s www/opensearch/instances.json
                  test -s www/redshift/instances.json
                  test -s www/azure/instances.json
                  test -s www/gcp/instances.json

            - uses: actions/setup-node@v6
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              with:
                  node-version-file: next/.nvmrc
                  cache: npm
                  cache-dependency-path: next/package-lock.json

            - name: Install Node dependencies and initialize data
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              working-directory: next
              run: |
                  npm ci
                  npm run init

            - name: Verify Node project when building a shell
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              working-directory: next
              run: |
                  npm run check-types
                  npm run test -- --run

            - name: Build curated Pages shell
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              working-directory: next
              env:
                  NEXT_PUBLIC_URL: ${{ steps.pages.outputs.base_url }}/
                  NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
                  NEXT_PUBLIC_INSTANCE_DETAIL_ORIGIN: https://instances.vantage.sh
                  NEXT_PUBLIC_REMOVE_ADVERTS: "1"
                  PAGES_LITE_BUILD: "1"
              run: |
                  npm run build:next
                  touch out/.nojekyll
                  test -s out/index.html

                  artifact_kib=$(du -sk out | cut -f1)
                  test "$artifact_kib" -lt 921600

            - name: Save Pages shell for this frontend
              if: steps.pages_shell.outputs.cache-hit != 'true'
              uses: actions/cache/save@v5
              with:
                  path: next/out
                  key: pages-shell-v2-${{ runner.os }}-${{ steps.pages_shell_key.outputs.tree }}

            - uses: actions/setup-python@v6
              id: setup_python
              with:
                  python-version: "3.12"

            - name: Restore China cloud SDK virtual environment
              id: china_cloud_venv
              uses: actions/cache/restore@v5
              with:
                  path: .venv-china-clouds
                  key: china-cloud-venv-v1-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('scripts/china_cloud/requirements.txt') }}

            - name: Install China cloud SDKs
              if: steps.china_cloud_venv.outputs.cache-hit != 'true'
              run: |
                  python -m venv --copies .venv-china-clouds
                  .venv-china-clouds/bin/python -m pip install \
                    --disable-pip-version-check \
                    --requirement scripts/china_cloud/requirements.txt

            - name: Save China cloud SDK virtual environment
              if: steps.china_cloud_venv.outputs.cache-hit != 'true'
              uses: actions/cache/save@v5
              with:
                  path: .venv-china-clouds
                  key: china-cloud-venv-v1-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('scripts/china_cloud/requirements.txt') }}

            - name: Download previous China cloud catalog
              id: previous_china_cloud_catalog
              run: |
                  previous=/tmp/china-clouds-previous.json
                  if curl --fail --location --retry 3 --retry-all-errors \
                      --connect-timeout 5 --max-time 30 \
                      "${{ steps.pages.outputs.base_url }}/data/china-clouds.json?run=${GITHUB_RUN_ID}" \
                      --output "$previous"; then
                    .venv-china-clouds/bin/python -m scripts.update_china_clouds \
                      --validate-only "$previous"
                    echo "available=true" >> "$GITHUB_OUTPUT"
                  elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
                    rm -f "$previous"
                    echo "::warning title=No previous China cloud catalog::Starting this push without cached provider data."
                    echo "available=false" >> "$GITHUB_OUTPUT"
                  else
                    exit 1
                  fi

            - name: Refresh complete China cloud catalogs
              id: china_cloud_refresh
              env:
                  PYTHONUNBUFFERED: "1"
                  ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
                  ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
                  TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
                  TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
                  VOLCENGINE_ACCESS_KEY_ID: ${{ secrets.VOLCENGINE_ACCESS_KEY_ID }}
                  VOLCENGINE_SECRET_ACCESS_KEY: ${{ secrets.VOLCENGINE_SECRET_ACCESS_KEY }}
                  HUAWEI_ACCESS_KEY_ID: ${{ secrets.HUAWEI_ACCESS_KEY_ID }}
                  HUAWEI_SECRET_ACCESS_KEY: ${{ secrets.HUAWEI_SECRET_ACCESS_KEY }}
              run: |
                  checkpoint=/tmp/china-clouds-checkpoint.json
                  failure_marker=/tmp/china-clouds-provider-failed
                  completion_marker=/tmp/china-clouds-provider-completed
                  : > "$completion_marker"
                  collector_args=(
                    --checkpoint "$checkpoint"
                    --failure-marker "$failure_marker"
                    --completion-marker "$completion_marker"
                  )
                  if [ "${{ steps.previous_china_cloud_catalog.outputs.available }}" = "true" ]; then
                    collector_args+=(--previous /tmp/china-clouds-previous.json)
                  fi

                  status=0
                  timeout --signal=TERM --kill-after=15s 120s \
                    .venv-china-clouds/bin/python -m scripts.update_china_clouds \
                    "${collector_args[@]}" \
                    || status=$?

                  if [ "$status" -eq 124 ] && \
                     [ "${{ steps.previous_china_cloud_catalog.outputs.available }}" = "true" ] && \
                     [ ! -e "$failure_marker" ] && \
                     [ -s "$checkpoint" ] && \
                     [ ! -s "$completion_marker" ]; then
                    echo "::warning title=China cloud refresh made no progress::Retrying all providers once with a 120-second budget."
                    status=0
                    timeout --signal=TERM --kill-after=15s 120s \
                      .venv-china-clouds/bin/python -m scripts.update_china_clouds \
                      "${collector_args[@]}" \
                      || status=$?
                  fi

                  if [ "$status" -eq 124 ]; then
                    if [ -e "$failure_marker" ]; then
                      echo "::error title=China cloud provider failed::At least one provider raised an explicit error before the overall timeout."
                      exit 1
                    fi
                    if [ ! -s "$checkpoint" ]; then
                      echo "::error title=China cloud refresh timed out::No valid previous catalog or completed provider checkpoint is available."
                      exit "$status"
                    fi
                    if [ ! -s "$completion_marker" ]; then
                      echo "::error title=China cloud refresh made no progress::Both attempts timed out before any provider completed; refusing to report a stale catalog as success."
                      exit 1
                    fi
                    echo "::warning title=China cloud refresh timed out::Publishing only validated provider progress; unfinished providers retain their previous snapshot."
                  elif [ "$status" -ne 0 ]; then
                    exit "$status"
                  fi

                  .venv-china-clouds/bin/python -m scripts.update_china_clouds \
                    --validate-only "$checkpoint"
                  install -m 0644 "$checkpoint" \
                    next/data/regionalClouds.generated.json
                  install -d next/public/data
                  install -m 0644 "$checkpoint" \
                    next/public/data/china-clouds.json

                  publish=true
                  if [ "$GITHUB_EVENT_NAME" != "push" ] && \
                     cmp -s /tmp/china-clouds-previous.json "$checkpoint"; then
                    publish=false
                    echo "No provider completed with changed data; skipping Pages deployment."
                  fi
                  echo "publish=$publish" >> "$GITHUB_OUTPUT"

            - name: Upload China cloud data snapshot
              if: steps.china_cloud_refresh.outputs.publish == 'true'
              uses: actions/upload-artifact@v6
              with:
                  name: china-cloud-catalog-${{ github.run_id }}
                  path: |
                      next/data/regionalClouds.generated.json
                      next/public/data/china-clouds.json
                  retention-days: 7

            - name: Overlay refreshed catalogs onto Pages shell
              if: steps.china_cloud_refresh.outputs.publish == 'true'
              run: |
                  test -s next/out/index.html
                  test -f next/out/.nojekyll
                  test -s next/public/data/china-clouds.json
                  install -d next/out/data
                  install -m 0644 \
                    next/public/data/china-clouds.json \
                    next/out/data/china-clouds.json
                  cmp next/public/data/china-clouds.json next/out/data/china-clouds.json

                  artifact_kib=$(du -sk next/out | cut -f1)
                  test "$artifact_kib" -lt 921600

            - name: Upload Pages artifact
              if: steps.china_cloud_refresh.outputs.publish == 'true'
              uses: actions/upload-pages-artifact@v5
              with:
                  path: next/out

    deploy:
        name: Deploy to GitHub Pages
        needs: build
        if: needs.build.outputs.publish == 'true'
        runs-on: ubuntu-24.04
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v5
