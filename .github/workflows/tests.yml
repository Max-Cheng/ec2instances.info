name: Tests
on: [push, pull_request]

jobs:
    gofmt:
        name: gofmt
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version: 1.26.0
                  cache: false
            - name: Check gofmt
              run: cd scraper && gofmt -l . && test -z "$(gofmt -l .)"

    go-tests:
        name: Go build, vet and tests (scraper)
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version: 1.26.0
                  cache-dependency-path: scraper/go.sum
            - name: Build, vet and test the scraper
              run: cd scraper && go build ./... && go vet ./... && go test ./...

    prettier:
        name: Prettier
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/cache@v5
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-npm-prettier
                  restore-keys: |
                      ${{ runner.os }}-npm-
            - run: npm install -g prettier@3.5.3
            - run: |-
                  prettier --check .

    tests:
        name: Check Types and Run Tests
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
            - name: Run China cloud unit tests
              run: python -m unittest discover -s scripts/china_cloud/tests -v
            - name: un-tar the staging www at the root of the repo
              run: curl -L https://instances.vantagestaging.sh/www_pre_build.tar.gz | tar -xzf -
            - uses: actions/setup-node@v6
              with:
                  node-version-file: next/.nvmrc
                  cache: npm
                  cache-dependency-path: next/package-lock.json
            - name: Initialize the test environment
              run: cd next && npm ci && npm run init
            - name: Check types
              run: cd next && npm run check-types
            - name: Run unit tests
              run: cd next && npm run test -- --coverage
