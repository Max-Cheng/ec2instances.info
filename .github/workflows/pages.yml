name: Daily GitHub Pages

on:
    push:
        branches:
            - main
        paths-ignore:
            - README.md
            - docs/**
    schedule:
        # 02:23 Asia/Shanghai (UTC+8). Avoid the busy top of the hour.
        - cron: "23 18 * * *"
    workflow_dispatch:

concurrency:
    group: github-pages
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        name: Build daily Pages artifact
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - name: Configure GitHub Pages
              id: pages
              uses: actions/configure-pages@v5

            - name: Restore Pages shell for this revision
              id: pages_shell
              uses: actions/cache/restore@v4
              with:
                  path: next/out
                  key: pages-shell-v1-${{ runner.os }}-${{ github.sha }}
                  # Pushes must rebuild and validate even when this SHA was rerun.
                  lookup-only: ${{ github.event_name == 'push' }}

            - name: Verify curated Pages shell input
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              run: |
                  jq -e \
                    '.generatedAt == null and .providers == {}' \
                    next/data/regionalClouds.generated.json >/dev/null
                  test ! -e next/public/data/china-clouds.json

            - name: Download current production instance data
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              run: |
                  curl --fail --location --retry 5 --retry-all-errors \
                    "https://instances.vantage.sh/www_pre_build.tar.gz?run=${GITHUB_RUN_ID}" \
                    --output /tmp/www_pre_build.tar.gz
                  sha256sum /tmp/www_pre_build.tar.gz
                  tar -tzf /tmp/www_pre_build.tar.gz > /tmp/www_entries.txt
                  if grep -Ev '^www(/|$)' /tmp/www_entries.txt | grep -q .; then
                    echo "Archive contains a path outside www/" >&2
                    exit 1
                  fi
                  if grep -Eq '(^|/)\.\.(/|$)|^/' /tmp/www_entries.txt; then
                    echo "Archive contains an unsafe path" >&2
                    exit 1
                  fi
                  tar -xzf /tmp/www_pre_build.tar.gz
                  test -s www/instances.json
                  test -s www/rds/instances.json
                  test -s www/cache/instances.json
                  test -s www/opensearch/instances.json
                  test -s www/redshift/instances.json
                  test -s www/azure/instances.json
                  test -s www/gcp/instances.json

            - uses: actions/setup-node@v4
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              with:
                  node-version-file: next/.nvmrc
                  cache: npm
                  cache-dependency-path: next/package-lock.json

            - name: Install Node dependencies and initialize data
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              working-directory: next
              run: |
                  npm ci
                  npm run init

            - name: Verify Node project when building a shell
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              working-directory: next
              run: |
                  npm run check-types
                  npm run test -- --run

            - name: Build curated Pages shell
              if: github.event_name == 'push' || steps.pages_shell.outputs.cache-hit != 'true'
              working-directory: next
              env:
                  NEXT_PUBLIC_URL: ${{ steps.pages.outputs.base_url }}/
                  NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
                  NEXT_PUBLIC_INSTANCE_DETAIL_ORIGIN: https://instances.vantage.sh
                  NEXT_PUBLIC_REMOVE_ADVERTS: "1"
                  PAGES_LITE_BUILD: "1"
              run: |
                  npm run build:next
                  touch out/.nojekyll
                  test -s out/index.html

                  artifact_kib=$(du -sk out | cut -f1)
                  test "$artifact_kib" -lt 921600

            - name: Save Pages shell for this revision
              if: steps.pages_shell.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: next/out
                  key: pages-shell-v1-${{ runner.os }}-${{ github.sha }}

            - uses: actions/setup-python@v5
              id: setup_python
              with:
                  python-version: "3.12"

            - name: Restore China cloud SDK virtual environment
              id: china_cloud_venv
              uses: actions/cache/restore@v4
              with:
                  path: .venv-china-clouds
                  key: china-cloud-venv-v1-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('scripts/china_cloud/requirements.txt') }}

            - name: Install China cloud SDKs
              if: steps.china_cloud_venv.outputs.cache-hit != 'true'
              run: |
                  python -m venv --copies .venv-china-clouds
                  .venv-china-clouds/bin/python -m pip install \
                    --disable-pip-version-check \
                    --requirement scripts/china_cloud/requirements.txt

            - name: Save China cloud SDK virtual environment
              if: steps.china_cloud_venv.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: .venv-china-clouds
                  key: china-cloud-venv-v1-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('scripts/china_cloud/requirements.txt') }}

            - name: Refresh complete China cloud catalogs
              env:
                  PYTHONUNBUFFERED: "1"
                  ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
                  ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
                  TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
                  TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
                  VOLCENGINE_ACCESS_KEY_ID: ${{ secrets.VOLCENGINE_ACCESS_KEY_ID }}
                  VOLCENGINE_SECRET_ACCESS_KEY: ${{ secrets.VOLCENGINE_SECRET_ACCESS_KEY }}
                  HUAWEI_ACCESS_KEY_ID: ${{ secrets.HUAWEI_ACCESS_KEY_ID }}
                  HUAWEI_SECRET_ACCESS_KEY: ${{ secrets.HUAWEI_SECRET_ACCESS_KEY }}
              run: |
                  status=0
                  timeout --signal=TERM --kill-after=15s 180s \
                    .venv-china-clouds/bin/python -m scripts.update_china_clouds \
                    || status=$?
                  if [ "$status" -eq 124 ]; then
                    echo "::error title=China cloud refresh timed out::Provider APIs did not finish within 180 seconds; keeping the previous Pages deployment."
                  fi
                  exit "$status"

            - name: Upload China cloud data snapshot
              uses: actions/upload-artifact@v4
              with:
                  name: china-cloud-catalog-${{ github.run_id }}
                  path: |
                      next/data/regionalClouds.generated.json
                      next/public/data/china-clouds.json
                  retention-days: 7

            - name: Overlay refreshed catalogs onto Pages shell
              run: |
                  test -s next/out/index.html
                  test -f next/out/.nojekyll
                  test -s next/public/data/china-clouds.json
                  install -d next/out/data
                  install -m 0644 \
                    next/public/data/china-clouds.json \
                    next/out/data/china-clouds.json
                  cmp next/public/data/china-clouds.json next/out/data/china-clouds.json

                  artifact_kib=$(du -sk next/out | cut -f1)
                  test "$artifact_kib" -lt 921600

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: next/out

    deploy:
        name: Deploy to GitHub Pages
        needs: build
        runs-on: ubuntu-24.04
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
